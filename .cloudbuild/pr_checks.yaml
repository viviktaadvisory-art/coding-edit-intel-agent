steps:
  # Install uv package manager and sync dependencies
  - name: "gcr.io/cloud-builders/gcloud"
    id: install-dependencies
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        curl -LsSf https://astral.sh/uv/0.11.7/install.sh | sh
        export PATH="$$HOME/.local/bin:$$PATH"
        uv sync --locked

  # Run unit tests using pytest
  - name: "gcr.io/cloud-builders/gcloud"
    id: unit-tests
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        export PATH="$$HOME/.local/bin:$$PATH"
        uv run pytest tests/unit

  # Run integration tests
  - name: "gcr.io/cloud-builders/gcloud"
    id: integration-tests
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        export PATH="$$HOME/.local/bin:$$PATH"
        uv run pytest tests/integration

logsBucket: gs://${PROJECT_ID}-coding-edit-intel-agent-logs/build-logs
options:
  env:
    - 'UV_PYTHON=3.12'
    - 'CI=true'
    # Integration tests run the agent in-process; pytest doesn't load .env.
    - 'GOOGLE_GENAI_USE_VERTEXAI=true'
    - 'GOOGLE_CLOUD_PROJECT=${PROJECT_ID}'
    - 'GOOGLE_CLOUD_LOCATION=global'
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
